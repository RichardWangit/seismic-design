<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設計地震力靜力法結構分析</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="gold-bar gold-bar--top"></div>

  <header class="app-header">
    <div class="app-header__row">
      <h1 class="app-header__title">設計地震力靜力法結構分析</h1>
      <p class="app-header__subtitle">依據113年建築物耐震設計規範及解說</p>
    </div>
  </header>

  <div class="app-body">

    <nav class="app-sidebar" aria-label="功能選單">
      <ul class="nav-list">
        <li>
          <button type="button" class="nav-item is-active" data-panel="panel-a">
            <span class="nav-item__badge">A</span>
            <span class="nav-item__body">
              <span class="nav-item__title">工址短週期與一秒週期水平譜加速度係數查詢</span>
              <span class="nav-item__desc">依表 2-1／2-3／2-4 查覽 Ds、Ms 及工址放大係數</span>
            </span>
            <span class="nav-item__chevron" aria-hidden="true">›</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-panel="panel-b">
            <span class="nav-item__badge">B</span>
            <span class="nav-item__body">
              <span class="nav-item__title">工址設計與最大考量水平譜加速度係數</span>
              <span class="nav-item__desc">依表 2-5(a)／2-5(b)，計算建築物基本振動週期與反應譜加速度係數</span>
            </span>
            <span class="nav-item__chevron" aria-hidden="true">›</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-panel="panel-c">
            <span class="nav-item__badge">C</span>
            <span class="nav-item__body">
              <span class="nav-item__title">建築物用途係數查詢</span>
              <span class="nav-item__desc">依 2.8 節，選擇建築物類別與所屬細項用途，查覽用途係數 I</span>
            </span>
            <span class="nav-item__chevron" aria-hidden="true">›</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-panel="panel-d">
            <span class="nav-item__badge">D</span>
            <span class="nav-item__body">
              <span class="nav-item__title">結構系統韌性容量與地震力折減係數</span>
              <span class="nav-item__desc">依表 1-3 及 2.9 節，查詢 R 值並計算 Ra 與結構系統地震力折減係數 Fu</span>
            </span>
            <span class="nav-item__chevron" aria-hidden="true">›</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-panel="panel-e">
            <span class="nav-item__badge">E</span>
            <span class="nav-item__body">
              <span class="nav-item__title">起始降伏地震力放大倍數 αy 查詢</span>
              <span class="nav-item__desc">依 2.9 節說明，依設計方法查覽起始降伏地震力放大倍數 αy</span>
            </span>
            <span class="nav-item__chevron" aria-hidden="true">›</span>
          </button>
        </li>
      </ul>
    </nav>

    <div class="app-content">
    <section class="content-panel is-active" id="panel-a"></section>

    <section class="content-panel" id="panel-b"></section>

    <section class="content-panel" id="panel-c"></section>

    <section class="content-panel" id="panel-d"></section>

    <section class="content-panel" id="panel-e"></section>
    </div>

  </div>

  <div class="gold-bar gold-bar--bottom"></div>
  <footer class="page-footer">
    依據《建築物耐震設計規範及解說》表 2-1、表 2-3、表 2-4、表 2-5、表 1-3、1.7 節及 2.8、2.9 節　資料來源：內政部營建署
  </footer>

  <script src="script.js"></script>
</body>
</html>
